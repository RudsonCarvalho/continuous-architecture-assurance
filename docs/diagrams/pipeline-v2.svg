<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1440" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#18243A"/>
    </marker>
    <marker id="arrowViolet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#157A3D"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="1440" fill="#FBFBF8"/>

  <!-- Title -->
  <text x="44" y="42" font-size="21" font-weight="700" fill="#18243A">AI-Assisted Reliability Pipeline — v2</text>
  <text x="44" y="64" font-size="13" fill="#5B6878">Reviewers under contract · Objective arbitration · Runtime governance · Continuous evals</text>

  <!-- INPUT -->
  <rect x="44" y="86" width="712" height="56" rx="10" fill="#FFFFFF" stroke="#5B6B7F" stroke-width="1.5"/>
  <rect x="44" y="86" width="6" height="56" rx="3" fill="#5B6B7F"/>
  <text x="66" y="110" font-size="14" font-weight="700" fill="#18243A">INPUT</text>
  <text x="66" y="130" font-size="12.5" fill="#3C4757">Specification · Business context · Target SLO · Constraints · Expected volume · Initial design</text>

  <line x1="400" y1="142" x2="400" y2="162" stroke="#18243A" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- LAYER 0 -->
  <rect x="44" y="164" width="712" height="92" rx="10" fill="#FFFFFF" stroke="#0E7490" stroke-width="1.5"/>
  <rect x="44" y="164" width="6" height="92" rx="3" fill="#0E7490"/>
  <text x="66" y="188" font-size="15" font-weight="700" fill="#0E7490">LAYER 0 — Indexing &amp; Traceability</text>
  <text x="66" y="209" font-size="12.5" fill="#3C4757">Extracts critical journeys, expected behaviors and constraints, each with an origin ID (EX-ID).</text>
  <rect x="66" y="220" width="620" height="24" rx="6" fill="#E6F4F7"/>
  <text x="78" y="236" font-size="12" fill="#0E5A6E">Rule: no scenario without an origin → SCENARIO_WITHOUT_ORIGIN fails at Gate 1</text>

  <line x1="400" y1="256" x2="400" y2="276" stroke="#18243A" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- TRIAGE -->
  <rect x="44" y="278" width="712" height="80" rx="10" fill="#FFFFFF" stroke="#6D28D9" stroke-width="1.5"/>
  <rect x="44" y="278" width="6" height="80" rx="3" fill="#6D28D9"/>
  <text x="66" y="302" font-size="15" font-weight="700" fill="#6D28D9">RISK-CLASS TRIAGE (deterministic)</text>
  <text x="66" y="322" font-size="12.5" fill="#3C4757">The flow — not the LLM — decides which reviewers run and in what order.</text>
  <text x="66" y="344" font-size="12" fill="#5B6878">critical → all reviewers   ·   medium → mandatory subset   ·   low → minimum viable</text>

  <line x1="400" y1="358" x2="400" y2="378" stroke="#18243A" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- LAYER 1 -->
  <rect x="44" y="380" width="712" height="322" rx="10" fill="#FFFFFF" stroke="#2456C9" stroke-width="1.5"/>
  <rect x="44" y="380" width="6" height="322" rx="3" fill="#2456C9"/>
  <text x="66" y="406" font-size="15" font-weight="700" fill="#2456C9">LAYER 1 — Committee of Reviewers Under Contract</text>

  <!-- 3x3 grid -->
  <g font-size="12.5" fill="#21314D" text-anchor="middle">
    <rect x="62" y="420" width="216" height="40" rx="8" fill="#EFF4FE" stroke="#B9CCF2"/>
    <text x="170" y="445">Spec Reviewer</text>
    <rect x="292" y="420" width="216" height="40" rx="8" fill="#EFF4FE" stroke="#B9CCF2"/>
    <text x="400" y="445">SLO / SLI Designer</text>
    <rect x="522" y="420" width="216" height="40" rx="8" fill="#EFF4FE" stroke="#B9CCF2"/>
    <text x="630" y="445">Failure Mode (FMEA)</text>

    <rect x="62" y="470" width="216" height="40" rx="8" fill="#EFF4FE" stroke="#B9CCF2"/>
    <text x="170" y="495">Resilience Patterns</text>
    <rect x="292" y="470" width="216" height="40" rx="8" fill="#EFF4FE" stroke="#B9CCF2"/>
    <text x="400" y="495">Security Reviewer</text>
    <rect x="522" y="470" width="216" height="40" rx="8" fill="#EFF4FE" stroke="#B9CCF2"/>
    <text x="630" y="495">Data Consistency</text>

    <rect x="62" y="520" width="216" height="40" rx="8" fill="#EFF4FE" stroke="#B9CCF2"/>
    <text x="170" y="545">Observability Designer</text>
    <rect x="292" y="520" width="216" height="40" rx="8" fill="#EFF4FE" stroke="#B9CCF2"/>
    <text x="400" y="545">Capacity &amp; Cost</text>
    <rect x="522" y="520" width="216" height="40" rx="8" fill="#EFF4FE" stroke="#B9CCF2"/>
    <text x="630" y="545">Test / Chaos Designer</text>
  </g>

  <!-- verdict contract -->
  <rect x="62" y="574" width="676" height="112" rx="8" fill="#101A2E"/>
  <text x="78" y="596" font-size="12" font-weight="700" fill="#9FC2FF">Verdict contract — mandatory output (free prose is discarded)</text>
  <g font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11.5" fill="#D9E4F5">
    <text x="78" y="618">verdict: PASS | CONCERN | FAIL      severity: LOW … CRITICAL</text>
    <text x="78" y="636">evidence: [EX-014, INC-2025-091]    ← traceable origin (G1)</text>
    <text x="78" y="654">metric_that_proves_fix: "duplicate debit = 0 under 3x replay"</text>
    <text x="78" y="672">reassess_when: "volume &gt; 500 tps"   reviewer_version: 2.3.1</text>
  </g>

  <line x1="400" y1="702" x2="400" y2="722" stroke="#18243A" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- LAYER 2 -->
  <rect x="44" y="724" width="712" height="184" rx="10" fill="#FFFFFF" stroke="#B45309" stroke-width="1.5"/>
  <rect x="44" y="724" width="6" height="184" rx="3" fill="#B45309"/>
  <text x="66" y="750" font-size="15" font-weight="700" fill="#B45309">LAYER 2 — Arbiter &amp; Objective Gates</text>
  <text x="66" y="770" font-size="12.5" fill="#3C4757">Conflicts resolved by severity × risk class · ties on critical changes escalate to a human.</text>

  <g text-anchor="middle">
    <rect x="62" y="784" width="156" height="48" rx="8" fill="#FDF3E4" stroke="#E5C597"/>
    <text x="140" y="804" font-size="12.5" font-weight="700" fill="#8A4D0F">G1 · Traceability</text>
    <text x="140" y="821" font-size="11" fill="#6B5536">zero origin-less scenarios</text>

    <rect x="230" y="784" width="156" height="48" rx="8" fill="#FDF3E4" stroke="#E5C597"/>
    <text x="308" y="804" font-size="12.5" font-weight="700" fill="#8A4D0F">G2 · Failure modes</text>
    <text x="308" y="821" font-size="11" fill="#6B5536">coverage per category</text>

    <rect x="398" y="784" width="156" height="48" rx="8" fill="#FDF3E4" stroke="#E5C597"/>
    <text x="476" y="804" font-size="12.5" font-weight="700" fill="#8A4D0F">G3 · Falsifiable ADRs</text>
    <text x="476" y="821" font-size="11" fill="#6B5536">failure metric + review trigger</text>

    <rect x="566" y="784" width="156" height="48" rx="8" fill="#FDF3E4" stroke="#E5C597"/>
    <text x="644" y="804" font-size="12.5" font-weight="700" fill="#8A4D0F">G4 · Readiness</text>
    <text x="644" y="821" font-size="11" fill="#6B5536">score ≥ class threshold</text>
  </g>

  <rect x="260" y="848" width="280" height="40" rx="20" fill="#B45309"/>
  <text x="400" y="873" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">GO / NO-GO + evidence trail</text>

  <line x1="400" y1="908" x2="400" y2="928" stroke="#18243A" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- OUTPUTS -->
  <rect x="44" y="930" width="712" height="58" rx="10" fill="#FFFFFF" stroke="#5B6B7F" stroke-width="1.5"/>
  <rect x="44" y="930" width="6" height="58" rx="3" fill="#5B6B7F"/>
  <text x="66" y="954" font-size="14" font-weight="700" fill="#18243A">OUTPUTS</text>
  <text x="66" y="975" font-size="12.5" fill="#3C4757">Reviewed architecture · ADRs · Failure-test matrix · Observability plan · Runbooks</text>

  <line x1="400" y1="988" x2="400" y2="1008" stroke="#18243A" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- LAYER 3 -->
  <rect x="44" y="1010" width="712" height="150" rx="10" fill="#FFFFFF" stroke="#157A3D" stroke-width="1.5"/>
  <rect x="44" y="1010" width="6" height="150" rx="3" fill="#157A3D"/>
  <text x="66" y="1036" font-size="15" font-weight="700" fill="#157A3D">LAYER 3 — Runtime Governance (the v1 gap)</text>
  <text x="66" y="1056" font-size="12.5" fill="#3C4757">Agents that operate the system in production act under a pre-execution cycle:</text>

  <g text-anchor="middle" font-size="12" fill="#14532D">
    <rect x="62" y="1070" width="132" height="40" rx="8" fill="#E9F6EE" stroke="#A7D7B9"/>
    <text x="128" y="1095" font-weight="700">Mandate</text>
    <line x1="198" y1="1090" x2="218" y2="1090" stroke="#157A3D" stroke-width="1.6" marker-end="url(#arrowGreen)"/>

    <rect x="222" y="1070" width="148" height="40" rx="8" fill="#E9F6EE" stroke="#A7D7B9"/>
    <text x="296" y="1095" font-weight="700">Intent declaration</text>
    <line x1="374" y1="1090" x2="394" y2="1090" stroke="#157A3D" stroke-width="1.6" marker-end="url(#arrowGreen)"/>

    <rect x="398" y="1070" width="156" height="40" rx="8" fill="#E9F6EE" stroke="#A7D7B9"/>
    <text x="476" y="1095" font-weight="700">Capability class</text>
    <line x1="558" y1="1090" x2="578" y2="1090" stroke="#157A3D" stroke-width="1.6" marker-end="url(#arrowGreen)"/>

    <rect x="582" y="1070" width="156" height="40" rx="8" fill="#E9F6EE" stroke="#A7D7B9"/>
    <text x="660" y="1089" font-weight="700">Execution</text>
    <text x="660" y="1103" font-size="11">+ audit trail</text>
  </g>
  <text x="66" y="1142" font-size="11.5" fill="#5B6878">read · write · effectful · irreversible — verification proportional to the capability class</text>

  <!-- arrow L3 -> L4 -->
  <line x1="400" y1="1160" x2="400" y2="1184" stroke="#18243A" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="412" y="1177" font-size="11.5" fill="#5B6878">incidents &amp; telemetry feed the corpus</text>

  <!-- LAYER 4 -->
  <rect x="44" y="1186" width="712" height="136" rx="10" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="44" y="1186" width="6" height="136" rx="3" fill="#7C3AED"/>
  <text x="66" y="1212" font-size="15" font-weight="700" fill="#7C3AED">LAYER 4 — Evals of the Reviewers</text>
  <text x="66" y="1232" font-size="12.5" fill="#3C4757">Corpus: real incidents and postmortems (never synthetic-only) · reviewers are versioned.</text>

  <g text-anchor="middle">
    <rect x="62" y="1246" width="320" height="44" rx="8" fill="#F3EDFD" stroke="#CDB6F2"/>
    <text x="222" y="1264" font-size="12.5" font-weight="700" fill="#5B21B6">Recall of known risks</text>
    <text x="222" y="1281" font-size="11" fill="#6B5A8E">does it catch the risk that caused the incident?</text>

    <rect x="398" y="1246" width="340" height="44" rx="8" fill="#F3EDFD" stroke="#CDB6F2"/>
    <text x="568" y="1264" font-size="12.5" font-weight="700" fill="#5B21B6">False-positive rate</text>
    <text x="568" y="1281" font-size="11" fill="#6B5A8E">flagging everything is failing too — metrics always paired</text>
  </g>
  <text x="66" y="1314" font-size="11.5" fill="#5B6878">A new prompt/skill version ships only if it improves both metrics.</text>

  <!-- LOOP: evals -> reviewers (violet) -->
  <path d="M 756 1254 L 806 1254 L 806 540 L 762 540" fill="none" stroke="#7C3AED" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrowViolet)"/>
  <text x="797" y="900" font-size="11.5" fill="#7C3AED" transform="rotate(-90 797 900)" text-anchor="middle">evals update the reviewers</text>

  <!-- LOOP: telemetry -> ADRs (green) -->
  <path d="M 756 1100 L 848 1100 L 848 800 L 762 800" fill="none" stroke="#157A3D" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrowGreen)"/>
  <text x="839" y="952" font-size="11.5" fill="#157A3D" transform="rotate(-90 839 952)" text-anchor="middle">telemetry triggers ADR reassess_when</text>

  <!-- footer -->
  <text x="44" y="1368" font-size="12" fill="#5B6878">Feedback loops close the cycle: production feeds back into the decisions (ADRs) and the reviewers' own quality (evals).</text>
  <text x="44" y="1390" font-size="11" fill="#9AA3AF">AI-Assisted Reliability Pipeline — v2 · reviewers as components: with a contract, gates, telemetry and their own failure criteria.</text>
</svg>
